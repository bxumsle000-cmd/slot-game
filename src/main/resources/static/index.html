<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark"> <!-- 設定深色模式 -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/bootstrap.css">
    <link rel="stylesheet" href="./css/reel.css">
    <title>Slot Game </title>
</head>

<body class="bg-primary-subtle pb-5">
<header class="d-flex justify-content-between align-content-center p-4 sticky-top"
        style="background-color: #020e20;">
    <span class="display-6">⭐ GOLD SLOT ⭐</span>
    <div class="d-flex align-items-center fs-5">
        <span>💰</span>
        <span id="deposit">1000</span>
        <span class="btn ms-2">🔊</span>
    </div>
</header>
<br><br>
<!-- 遊戲版面 -->
<main class="mx-auto my-5 p-5 border border-3 border-warning
                 d-flex justify-content-center gap-4 m-3"
      style="max-width: 720px ; box-shadow: 0 0 20px rgba(240, 200, 82, 0.911);">
    <div class="reel-window">
        <div class="reel-strip">
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
        </div>
    </div>

    <div class="reel-window">
        <div class="reel-strip">
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
        </div>
    </div>

    <div class="reel-window">
        <div class="reel-strip">
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
        </div>
    </div>

    <div class="reel-window">
        <div class="reel-strip">
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
        </div>
    </div>

    <div class="reel-window">
        <div class="reel-strip">
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
            <div class="reel-cell"></div>
        </div>
    </div>

</main>

<div class="d-flex justify-content-center"><span class="fs-3" id="result">準備好就spin!</span></div>
<br>

<!-- 本局贏分、下注金額、Spin  -->
<div class="d-flex justify-content-center m-5 ps-5 " style="gap: 6rem;">
    <div class="d-flex flex-column gap-3">
        <div>本局贏分</div>
        <div class="fs-1" id="winScore">0</div>
    </div>
    <div class="d-flex flex-column gap-3">
        <div>下注金額</div>
        <div class="d-flex">
            <div class="fs-1" id="betAmount">50</div>
            <button class="btn" id="bet">+</button>
        </div>
    </div>

    <div class="ms-5">
        <button class="btn btn-danger btn-lg d-flex align-items-center mt-2 ms-5 " style="font-size: 50px;"
                id="spin">Spin</button>
    </div>
</div>

<!--  dialog  -->
<div class="position-fixed bottom-0 end-0 me-4 mb-4 fs-5">
    <button id="paylineTable">查看賠付表</button>
</div>

<dialog id="paytableDialog" class="bg-dark border border-warning px-5">
    <h5 class="text-warning my-4 fs-2 ">🎰 賠付表（左起連線倍率）</h5>
    <table class="table table-dark table-striped text-center fs-5">
        <thead>
        <tr>
            <th>符號</th>
            <th>3連</th>
            <th>4連</th>
            <th>5連</th>
        </tr>
        </thead>
        <tbody>
        </tr>
        <td>7</td>
        <td>10x</td>
        <td>20x</td>
        <td>100x</td>
        </tr>
        </tr>
        <td>BAR</td>
        <td>2x</td>
        <td>5x</td>
        <td>20x</td>
        </tr>
        </tr>
        <td>🍒</td>
        <td>1x</td>
        <td>2x</td>
        <td>10x</td>
        </tr>
        </tr>
        <td>🍋</td>
        <td>0.6x</td>
        <td>1x</td>
        <td>5x</td>
        </tr>
        </tbody>
    </table>
    <div class="d-flex gap-5 my-5">
        <img src="/img/payline-1.png" alt="payline-1">
        <img src="/img/payline-2.png" alt="payline-2">
        <img src="/img/payline-3.png" alt="payline-3">
        <img src="/img/payline-4.png" alt="payline-4">
        <img src="/img/payline-5.png" alt="payline-5">
    </div>
    <hr>
    <div class="mt-4 fs-3 ">
        <h3 class="mb-3">規則:</h3>
        <p> 1. 投注金額最低50元，最高500</p>
        <p> 2. ⭐可替代任何符號，以組成最高獎</p>
        <div class="d-flex justify-content-center mt-4">
            <button id="closeRule">Close</button>
        </div>
    </div>
</dialog>

<script src="/js/game.js"></script>
<script src="/js/render.js"></script>
<script src="/js/betConfig.js"></script>
</body>
</html>
