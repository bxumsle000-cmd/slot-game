<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.css">
    <title>Slot Game </title>
    <style>
        .reel-window {
            width: 130px;
            /* 放大後的單一 reel 寬度 */
            height: 240px;
            /* = 3 格 × 100px，剛好露出 3 個符號 */
            overflow: hidden;
            /* 超出窗口的符號被裁掉：動畫時符號從這裡捲進捲出 */
            border: 2px solid #ffc107;
            box-shadow: 0 0 8px rgba(158, 28, 11, 0.911)
        }

        /* reel-strip：真正會動的符號帶，之後對它做 translateY 位移就是「轉動」 */
        .reel-strip {
            display: flex;
            flex-direction: column;
        }

        /* reel-cell：每一格符號，等高才好算位移量（轉一格 = 位移 100px） */
        .reel-cell {
            height: 80px;
            /* 每格固定高度，動畫對齊的基本單位（放大後） */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            /* 符號字級跟著放大 */
        }

        /* dialog 的內建遮罩 ::backdrop：瀏覽器預設太淡，加深讓彈窗更聚焦 */
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.6);
        }
    </style>
</head>



<body class="bg-primary-subtle pb-5">
<header class="d-flex justify-content-between align-content-center p-4 sticky-top"
        style="background-color: #020e20;">
    <span class="display-6">⭐ GOLD SLOT ⭐</span>
    <div class="d-flex align-items-center fs-5">
        <span>💰</span>
        <span class="" id="deposit">1000</span>
        <span class=" btn ms-2">🔊</span>
    </div>
</header>
<br><br>
<main class="mx-auto my-5 p-5 border border-3 border-warning"
      style="max-width: 720px ; box-shadow: 0 0 20px rgba(240, 200, 82, 0.911);">
    <!-- 外層純 flex：5 個 reel 窗口並排、置中、彼此留間距 -->
    <div class="d-flex justify-content-center gap-4 m-3 ">
        <!-- 每欄 = 一個 reel 窗口；reel-strip 是之後要 translateY 捲動的符號帶 -->
        <div class="reel-window">
            <div class="reel-strip">
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
            </div>
        </div>

        <div class="reel-window">
            <div class="reel-strip">
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
            </div>
        </div>

        <div class="reel-window">
            <div class="reel-strip">
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
            </div>
        </div>

        <div class="reel-window">
            <div class="reel-strip">
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
            </div>
        </div>

        <div class="reel-window">
            <div class="reel-strip">
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
                <div class="reel-cell"></div>
            </div>
        </div>

    </div>
</main>

<div class="d-flex justify-content-center"><span class="fs-3" id="result">準備好就spin!</span></div>
<br>

<div class="d-flex justify-content-center m-5 ps-5 " style="gap: 6rem;">
    <div class="d-flex flex-column gap-3">
        <div>本局贏分</div>
        <div class="fs-1" id="winScore">0</div>
    </div>
    <div class="d-flex flex-column gap-3">
        <div>下注金額</div>
        <div class="d-flex">
            <div class="fs-1" id="betAmount">50</div>
            <button class="btn" id="bet">+</button>
        </div>
    </div>

    <div class="ms-5">
        <button class="btn btn-danger btn-lg d-flex align-items-center mt-2 ms-5 " style="font-size: 50px;"
                id="spin">Spin</button>
    </div>
</div>

<div class="position-fixed bottom-0 end-0 me-4 mb-2 fs-5">
    <button id="paylineTable">查看賠付表</button>
</div>

<!-- 賠付表彈窗：原生 <dialog>。showModal() 開啟時瀏覽器自動處理
     置中、疊在最上層（top layer）、::backdrop 遮罩、按 ESC 關閉 -->
<dialog id="paytableDialog" class="bg-dark border border-warning px-5">
    <h5 class="text-warning my-4 fs-2 ">🎰 賠付表（左起連線倍率）</h5>
    <table class="table table-dark table-striped text-center fs-5">
        <thead>
        <tr>
            <th>符號</th>
            <th>3連</th>
            <th>4連</th>
            <th>5連</th>
        </tr>
        </thead>
        <tbody>
        </tr>
        <td>7</td>
        <td>10x</td>
        <td>20x</td>
        <td>100x</td>
        </tr>
        </tr>
        <td>BR</td>
        <td>2x</td>
        <td>5x</td>
        <td>20x</td>
        </tr>
        </tr>
        <td>🍒</td>
        <td>1x</td>
        <td>2x</td>
        <td>10x</td>
        </tr>
        </tr>
        <td>🍋</td>
        <td>0.6x</td>
        <td>1x</td>
        <td>5x</td>
        </tr>
        </tbody>
    </table>
    <div class="mt-4 ">
        <h5 class="mb-3">規則:</h5>
        <p> 1. 投注金額固定50元</p>
        <p> 2. 🃏可替代任何符號，以組成最高獎</p>
        <div class="d-flex justify-content-center mt-4">
            <button id="closeRule">Close</button>
        </div>
    </div>
</dialog>

</body>


</html>
